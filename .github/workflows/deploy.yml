name: Build & Deploy to Hostinger

# Runs on every push to main, and can be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy dist/ to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # The compiled site only. Everything in here goes to the server folder below.
          local-dir: ./dist/
          # Hostinger document root. Change if your site lives in a different folder
          # (e.g. /domains/yourdomain.com/public_html/).
          server-dir: /public_html/
          # One-time clean upload: wipe the target and upload the build fresh, so no
          # stale source files or partial state remain. (Can be removed later to make
          # subsequent deploys incremental/faster.)
          dangerous-clean-slate: true
